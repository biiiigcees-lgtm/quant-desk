version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - PORT=3002
    depends_on:
      - redis
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - ./quant-core:/app/quant-core

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/ui:/app
      - /app/node_modules
      - ./quant-core:/app/quant-core

volumes:
  redis_data:
