version: '3.8'

services:
  quant-core:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - AMBERDATA_API_KEY=${AMBERDATA_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
    depends_on:
      - kafka
      - redis
      - prometheus
    networks:
      - quant-network

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - quant-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - quant-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quant-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - quant-network

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ../../../infra/observability/loki-config.yml:/etc/loki/local-config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - quant-network

  vector:
    image: timberio/vector:0.34.0-alpine
    ports:
      - "6000:6000"
    volumes:
      - ../../../infra/observability/vector.toml:/etc/vector/vector.toml:ro
      - /var/log:/var/log:ro
    command: --config /etc/vector/vector.toml
    depends_on:
      - loki
    networks:
      - quant-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-lokiexplore-app
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - quant-network

volumes:
  loki-data:
  grafana-data:

networks:
  quant-network:
    driver: bridge
