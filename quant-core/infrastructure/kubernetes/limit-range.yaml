apiVersion: v1
kind: LimitRange
metadata:
  name: quant-core-limits
  namespace: quant-core
spec:
  limits:
  - default:
      cpu: "2000m"
      memory: "2Gi"
      ephemeral-storage: "2Gi"
    defaultRequest:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    type: Container
